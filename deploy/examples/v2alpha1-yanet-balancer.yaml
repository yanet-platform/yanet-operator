# Yanet CR (boxType=balancer) with typed per-installation overrides.
# Available overrides (these only, no patches):
#   components.<name>.enabled                       — true → replicas=1, false → replicas=0 (same as enable in v1)
#   components.<name>.containers.<cname>.name       — override image name for container <cname>
#   components.<name>.containers.<cname>.tag        — override image tag for container <cname>
#
# For the 5 hardcoded components <cname> equals the component name
# itself ("controlplane", "dataplane", "bird", "birdAdapter",
# "announcer"). For operators it must match an
# OperatorContainer.name from YanetConfig.
---
apiVersion: yanet.yanet-platform.io/v2alpha1
kind: YanetV2
metadata:
  name: edge-pop1-balancer
  namespace: yanet
spec:
  boxType: balancer
  nodeSelector:
    role: yanet-edge
    type: balancer
  enabled: true
  autoSync: false        # manual rollouts for this installation

  components:
    # Pinpoint version pinning of cp/dp on this installation.
    controlplane:
      containers:
        controlplane: {tag: v2.1.5-hotfix}
    dataplane:
      containers:
        dataplane: {tag: v2.1.5-hotfix}

    # Fully disable bird on this box (replicas=0), keeping everything else from boxType=balancer.
    bird:
      enabled: false

    # Replace bird-adapter image with a fork.
    birdAdapter:
      containers:
        birdAdapter:
          name: bird-adapter-forked
          tag: v0.3-fork
