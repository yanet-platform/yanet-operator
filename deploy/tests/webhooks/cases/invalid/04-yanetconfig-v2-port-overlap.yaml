# v2alpha1 YanetConfig — must be REJECTED by vyanetconfig-v2.kb.io.
# Reason: controlplane and dataplane listen on the same port.
apiVersion: yanet.yanet-platform.io/v2alpha1
kind: YanetConfigV2
metadata:
  name: config-v2-bad-portoverlap
  namespace: yanet
spec:
  components:
    controlplane:
      image: {name: controlplane, tag: test}
      port: 8080
    dataplane:
      image: {name: dataplane, tag: test}
      port: 8080
  boxTypes:
    - name: release
      components:
        controlplane: {}
        dataplane: {}
