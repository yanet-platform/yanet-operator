replicaCount: 2

image:
  repository: yanetplatform/yanet-operator
  pullPolicy: IfNotPresent
  # tag: ""  # If not set, defaults to .Chart.AppVersion from Chart.yaml

imagePullSecrets: []
nameOverride: ""
fullnameOverride: "yanet-operator"

serviceAccount:
  name: "controller-manager"

podAnnotations: {}

hostNetwork: false

podSecurityContext: {}

securityContext: {}

resources:
  limits:
    cpu: 4
    memory: 4Gi
  requests:
     cpu: 2
     memory: 2Gi

tolerations: []
nodeSelector: {}

affinity: {}

# Webhook configuration
webhook:
  enabled: true
  port: 9443
  certManager:
    enabled: false
  # Certificate generation using kube-webhook-certgen
  certGen:
    image:
      repository: registry.k8s.io/ingress-nginx/kube-webhook-certgen
      tag: v1.5.2
      pullPolicy: IfNotPresent

# Metrics configuration
metrics:
  enabled: true
  serviceMonitor:
    enabled: true
    interval: 30s
    release: kube-prometheus-stack

# Grafana dashboards configuration
grafana:
  dashboards:
    enabled: true
    # Namespace where the dashboard ConfigMap will be created
    namespace: kube-mon
    # Labels to add to the ConfigMap
    # These labels are used by Grafana sidecar to discover dashboards
    labels:
      grafana_dashboard: "1"
    # Annotations to add to the ConfigMap
    annotations: {}

yanetconfig:
  spec:
    autodiscovery:
      enable: false
      namespace: yanet
      registry: dockerhub.io
    stop: false

extraManifests: {}
