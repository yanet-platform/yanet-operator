replicaCount: 2

image:
  repository: ghcr-io.mirror.yandex.net/yanet-platform/yanet-operator
  pullPolicy: IfNotPresent
  # tag: ""  # If not set, defaults to .Chart.AppVersion from Chart.yaml

imagePullSecrets: []
nameOverride: ""
fullnameOverride: "yanet-operator"

serviceAccount:
  name: "controller-manager"

podAnnotations: {}

hostNetwork: false

podSecurityContext: {}

securityContext: {}

resources:
  limits:
    cpu: 4
    memory: 4Gi
  requests:
     cpu: 2
     memory: 2Gi

tolerations: []
nodeSelector: {}

affinity: {}

# Webhook configuration
webhook:
  enabled: true
  port: 9443
  # failurePolicy controls what happens when the webhook endpoint is unreachable.
  # "Ignore" — allow the request through when the webhook is unavailable. This is
  #             required to avoid x509 errors during the window between Helm's main
  #             resource phase (which resets caBundle to empty) and the post-install/
  #             post-upgrade job that patches caBundle back in. Also allows installs
  #             when the operator pod is not yet Ready.
  # "Fail"   — reject the request if the webhook is unreachable (stricter, but
  #             requires caBundle to always be populated and operator to be running).
  failurePolicy: Ignore
  certManager:
    enabled: false
  # Certificate generation using kube-webhook-certgen
  certGen:
    image:
      repository: registry.k8s.io/ingress-nginx/kube-webhook-certgen
      tag: v1.6.9
      pullPolicy: IfNotPresent

# Metrics configuration
metrics:
  enabled: true
  serviceMonitor:
    enabled: true
    interval: 30s
    release: kube-prometheus-stack

# Grafana dashboards configuration
grafana:
  dashboards:
    enabled: true
    # Namespace where the dashboard ConfigMap will be created
    namespace: kube-mon
    # Labels to add to the ConfigMap
    # These labels are used by Grafana sidecar to discover dashboards
    labels:
      grafana_dashboard: "1"
    # Annotations to add to the ConfigMap
    annotations: {}

yanetconfig:
  spec:
    autodiscovery:
      enable: false
      namespace: yanet
      registry: dockerhub.io
    stop: false

extraManifests: {}

# ============================================================
# Node Feature Discovery (optional sub-chart).
# When enabled the chart deploys NFD which exposes
# feature.node.kubernetes.io/cpu-numa_nodes_count on every node.
# The v2 reconciler reads this label to decide controlplane NUMA
# fan-out. If you already run NFD in the cluster, leave this off.
# ============================================================
node-feature-discovery:
  enabled: false

# ============================================================
# v2alpha1 cluster-wide YanetConfig (optional).
#
# When provided, the chart renders templates/yanetconfig-v2.yaml
# with this body. The shape mirrors the final model:
#   spec.components — palette of components
#   spec.patches    — named registry of strategic-merge fragments
#   spec.boxTypes   — box presets (which components + which patches)
#
# Comment out / unset to omit the YanetConfig (e.g. if you manage
# it through GitOps or applies it manually).
# ============================================================
