{{- if .Values.grafana.dashboards.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "yanet-operator.fullname" . }}-dashboard
  namespace: {{ .Values.grafana.dashboards.namespace | default .Release.Namespace }}
  labels:
    {{- include "yanet-operator.labels" . | nindent 4 }}
    {{- with .Values.grafana.dashboards.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- with .Values.grafana.dashboards.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
data:
  yanet-operator.json: |-
{{ .Files.Get "dashboards/yanet-operator.json" | indent 4 }}
{{- end }}
