---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: validating-webhook-configuration
webhooks:
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: webhook-service
      namespace: system
      path: /validate-yanet-yanet-platform-io-v1alpha1-yanet
  failurePolicy: Fail
  name: vyanet.kb.io
  rules:
  - apiGroups:
    - yanet.yanet-platform.io
    apiVersions:
    - v1alpha1
    operations:
    - CREATE
    - UPDATE
    resources:
    - yanets
  sideEffects: None
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: webhook-service
      namespace: system
      path: /validate-yanet-yanet-platform-io-v1alpha1-yanetconfig
  failurePolicy: Fail
  name: vyanetconfig.kb.io
  rules:
  - apiGroups:
    - yanet.yanet-platform.io
    apiVersions:
    - v1alpha1
    operations:
    - CREATE
    - UPDATE
    resources:
    - yanetconfigs
  sideEffects: None
