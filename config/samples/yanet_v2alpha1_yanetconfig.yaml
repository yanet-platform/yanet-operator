apiVersion: yanet.yanet-platform.io/v2alpha1
kind: YanetConfigV2
metadata:
  labels:
    app.kubernetes.io/name: yanet-operator
    app.kubernetes.io/managed-by: kustomize
  name: yanetconfig-sample
spec:
  stop: false
  updatewindow: 60
  
  # Global image settings for v2alpha1
  images:
    registry: dockerhub.io
    prefix: yanet2
    tag: "2.0"
    pullPolicy: IfNotPresent
  
  # Global config paths
  config:
    hostPath: /etc/yanet
    files:
      controlplane: controlplane-director.yaml
      dataplane: dataplane.yaml
  
  # Global controlplane configuration
  controlplane:
    enabled: true
    image:
      name: yanet-controlplane-director
    resources:
      requests:
        memory: "2Gi"
        cpu: "1"
    hostIPC: true
    securityContext:
      privileged: false
      capabilities:
        add:
        - NET_ADMIN
        - IPC_LOCK
  
  # Global dataplane configuration
  dataplane:
    enabled: true
    image:
      name: yanet-dataplane
    resources:
      requests:
        memory: "8Gi"
        hugepages-1Gi: "8Gi"
    hostIPC: true
    hostNetwork: true
    securityContext:
      privileged: true
