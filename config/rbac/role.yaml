---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-role
rules:
- apiGroups:
  - ""
  resources:
  - events
  verbs:
  - create
  - patch
- apiGroups:
  - ""
  resources:
  - nodes
  - pods
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - apps
  resources:
  - deployments
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - coordination.k8s.io
  resources:
  - configmap
  - leases
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - yanet.yanet-platform.io
  resources:
  - yanetconfigs
  - yanets
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - yanet.yanet-platform.io
  resources:
  - yanetconfigs/finalizers
  - yanets/finalizers
  verbs:
  - update
- apiGroups:
  - yanet.yanet-platform.io
  resources:
  - yanetconfigs/status
  - yanets/status
  verbs:
  - get
  - patch
  - update
