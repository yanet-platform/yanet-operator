---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: yanetsv2.yanet.yanet-platform.io
spec:
  group: yanet.yanet-platform.io
  names:
    categories:
    - yanet
    kind: YanetV2
    listKind: YanetV2List
    plural: yanetsv2
    shortNames:
    - yntv2
    singular: yanetv2
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.boxType
      name: BoxType
      type: string
    - jsonPath: .spec.autoSync
      name: AutoSync
      type: boolean
    - jsonPath: .status.conditions[?(@.type=="Available")].status
      name: Available
      type: string
    - jsonPath: .status.conditions[?(@.type=="Progressing")].status
      name: Progressing
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v2alpha1
    schema:
      openAPIV3Schema:
        description: YanetV2 is the Schema for the yanets API.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              YanetSpec is the per-installation CR. Everything a "box" looks like
              (which components are deployed and how they are patched) is defined
              in YanetConfigV2.spec.boxTypes[<boxType>]. This CR is intentionally
              tiny: it only selects the target nodes and references a boxType.

              No patches and no inline component specs are accepted here — the
              only per-installation customisation knobs are typed point-overrides
              in components.<name>.{enabled,image}.
            properties:
              autoSync:
                description: |-
                  AutoSync enables automatic synchronization. When false, the
                  reconciler reports drift via Status without touching the
                  generated Deployments — including not creating missing
                  Deployments and not pruning orphans. Hand edits to managed
                  Deployments are preserved. Defaults to false.
                type: boolean
              boxType:
                description: |-
                  BoxType selects a boxType definition from
                  YanetConfigV2.spec.boxTypes[]. Required.
                minLength: 1
                type: string
              components:
                description: |-
                  Components offers narrow, per-installation overrides for
                  individual components. Only image and enabled flags are
                  allowed. Anything else (annotations, resources, ...) lives in
                  YanetConfigV2 patches.
                properties:
                  announcer:
                    description: |-
                      YanetComponentOverride is the only per-installation customisation
                      surface for a component. Anything broader belongs to a patch.
                    properties:
                      containers:
                        additionalProperties:
                          description: |-
                            ImageRef identifies an image. Registry and prefix come from
                            YanetConfigV2.spec.images.
                          properties:
                            name:
                              description: Name is the image name without registry/prefix/tag.
                              type: string
                            tag:
                              description: Tag is the image tag.
                              type: string
                          type: object
                        description: |-
                          Containers overrides image.name and/or image.tag per
                          container, keyed by container name. For the 5 hardcoded
                          components (single-container) the key is the kind:
                          "controlplane", "dataplane", "bird", "birdAdapter",
                          "announcer". For operators the key is the
                          YanetConfigV2.spec.components.operators[].containers[].name.
                          Registry/prefix come from YanetConfigV2.spec.images.
                        type: object
                      enabled:
                        description: |-
                          Enabled toggles this component for this installation only.
                          true → replicas=1, false → replicas=0 (component still
                          rendered, but with zero pods).
                        type: boolean
                    type: object
                  bird:
                    description: |-
                      YanetComponentOverride is the only per-installation customisation
                      surface for a component. Anything broader belongs to a patch.
                    properties:
                      containers:
                        additionalProperties:
                          description: |-
                            ImageRef identifies an image. Registry and prefix come from
                            YanetConfigV2.spec.images.
                          properties:
                            name:
                              description: Name is the image name without registry/prefix/tag.
                              type: string
                            tag:
                              description: Tag is the image tag.
                              type: string
                          type: object
                        description: |-
                          Containers overrides image.name and/or image.tag per
                          container, keyed by container name. For the 5 hardcoded
                          components (single-container) the key is the kind:
                          "controlplane", "dataplane", "bird", "birdAdapter",
                          "announcer". For operators the key is the
                          YanetConfigV2.spec.components.operators[].containers[].name.
                          Registry/prefix come from YanetConfigV2.spec.images.
                        type: object
                      enabled:
                        description: |-
                          Enabled toggles this component for this installation only.
                          true → replicas=1, false → replicas=0 (component still
                          rendered, but with zero pods).
                        type: boolean
                    type: object
                  birdAdapter:
                    description: |-
                      YanetComponentOverride is the only per-installation customisation
                      surface for a component. Anything broader belongs to a patch.
                    properties:
                      containers:
                        additionalProperties:
                          description: |-
                            ImageRef identifies an image. Registry and prefix come from
                            YanetConfigV2.spec.images.
                          properties:
                            name:
                              description: Name is the image name without registry/prefix/tag.
                              type: string
                            tag:
                              description: Tag is the image tag.
                              type: string
                          type: object
                        description: |-
                          Containers overrides image.name and/or image.tag per
                          container, keyed by container name. For the 5 hardcoded
                          components (single-container) the key is the kind:
                          "controlplane", "dataplane", "bird", "birdAdapter",
                          "announcer". For operators the key is the
                          YanetConfigV2.spec.components.operators[].containers[].name.
                          Registry/prefix come from YanetConfigV2.spec.images.
                        type: object
                      enabled:
                        description: |-
                          Enabled toggles this component for this installation only.
                          true → replicas=1, false → replicas=0 (component still
                          rendered, but with zero pods).
                        type: boolean
                    type: object
                  controlplane:
                    description: |-
                      YanetComponentOverride is the only per-installation customisation
                      surface for a component. Anything broader belongs to a patch.
                    properties:
                      containers:
                        additionalProperties:
                          description: |-
                            ImageRef identifies an image. Registry and prefix come from
                            YanetConfigV2.spec.images.
                          properties:
                            name:
                              description: Name is the image name without registry/prefix/tag.
                              type: string
                            tag:
                              description: Tag is the image tag.
                              type: string
                          type: object
                        description: |-
                          Containers overrides image.name and/or image.tag per
                          container, keyed by container name. For the 5 hardcoded
                          components (single-container) the key is the kind:
                          "controlplane", "dataplane", "bird", "birdAdapter",
                          "announcer". For operators the key is the
                          YanetConfigV2.spec.components.operators[].containers[].name.
                          Registry/prefix come from YanetConfigV2.spec.images.
                        type: object
                      enabled:
                        description: |-
                          Enabled toggles this component for this installation only.
                          true → replicas=1, false → replicas=0 (component still
                          rendered, but with zero pods).
                        type: boolean
                    type: object
                  dataplane:
                    description: |-
                      YanetComponentOverride is the only per-installation customisation
                      surface for a component. Anything broader belongs to a patch.
                    properties:
                      containers:
                        additionalProperties:
                          description: |-
                            ImageRef identifies an image. Registry and prefix come from
                            YanetConfigV2.spec.images.
                          properties:
                            name:
                              description: Name is the image name without registry/prefix/tag.
                              type: string
                            tag:
                              description: Tag is the image tag.
                              type: string
                          type: object
                        description: |-
                          Containers overrides image.name and/or image.tag per
                          container, keyed by container name. For the 5 hardcoded
                          components (single-container) the key is the kind:
                          "controlplane", "dataplane", "bird", "birdAdapter",
                          "announcer". For operators the key is the
                          YanetConfigV2.spec.components.operators[].containers[].name.
                          Registry/prefix come from YanetConfigV2.spec.images.
                        type: object
                      enabled:
                        description: |-
                          Enabled toggles this component for this installation only.
                          true → replicas=1, false → replicas=0 (component still
                          rendered, but with zero pods).
                        type: boolean
                    type: object
                  operators:
                    additionalProperties:
                      description: |-
                        YanetComponentOverride is the only per-installation customisation
                        surface for a component. Anything broader belongs to a patch.
                      properties:
                        containers:
                          additionalProperties:
                            description: |-
                              ImageRef identifies an image. Registry and prefix come from
                              YanetConfigV2.spec.images.
                            properties:
                              name:
                                description: Name is the image name without registry/prefix/tag.
                                type: string
                              tag:
                                description: Tag is the image tag.
                                type: string
                            type: object
                          description: |-
                            Containers overrides image.name and/or image.tag per
                            container, keyed by container name. For the 5 hardcoded
                            components (single-container) the key is the kind:
                            "controlplane", "dataplane", "bird", "birdAdapter",
                            "announcer". For operators the key is the
                            YanetConfigV2.spec.components.operators[].containers[].name.
                            Registry/prefix come from YanetConfigV2.spec.images.
                          type: object
                        enabled:
                          description: |-
                            Enabled toggles this component for this installation only.
                            true → replicas=1, false → replicas=0 (component still
                            rendered, but with zero pods).
                          type: boolean
                      type: object
                    description: Operators keyed by OperatorSpec.Name.
                    type: object
                type: object
              enabled:
                description: |-
                  Enabled is the "scale-to-zero" switch for the whole
                  installation. When false, the operator still renders every
                  Deployment/Service/ConfigMap (so generated specs can be
                  inspected and patches still apply), but forces replicas=0
                  on every Deployment regardless of per-component
                  overrides. Use this to verify the rendered spec without
                  actually running pods. Defaults to true.

                  To freeze the operator's view of the CR (keep existing
                  Deployments untouched, including hand edits) use
                  AutoSync=false instead.
                type: boolean
              nodeSelector:
                additionalProperties:
                  type: string
                description: |-
                  NodeSelector restricts the installation to a subset of nodes.
                  Empty selector matches all nodes (use with care).
                type: object
            required:
            - boxType
            type: object
          status:
            description: YanetStatus describes the observed state of a YanetV2 installation.
            properties:
              conditions:
                description: Conditions hold latest observations.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              nodesStatus:
                additionalProperties:
                  description: NodeStatus carries per-node status.
                  properties:
                    deployments:
                      additionalProperties:
                        type: string
                      description: Deployments maps Deployment name to a short status
                        string.
                      type: object
                    lastUpdateTime:
                      format: date-time
                      type: string
                    nodeName:
                      type: string
                    numaCount:
                      description: |-
                        NumaCount records the number of controlplane Deployments
                        generated for this node.
                      format: int32
                      type: integer
                  type: object
                description: NodesStatus tracks status per node.
                type: object
              pods:
                additionalProperties:
                  items:
                    type: string
                  type: array
                description: Pods groups managed Pod names by phase.
                type: object
              services:
                description: Services lists managed Service names.
                items:
                  type: string
                type: array
              sync:
                description: Sync summarises Deployments by sync state.
                properties:
                  disabled:
                    items:
                      type: string
                    type: array
                  error:
                    items:
                      type: string
                    type: array
                  outofsync:
                    items:
                      type: string
                    type: array
                  synced:
                    items:
                      type: string
                    type: array
                  syncwaiting:
                    items:
                      type: string
                    type: array
                type: object
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
