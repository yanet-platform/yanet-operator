                          tag:
                            description: Tag is the image tag.
                            type: string
                        type: object
                      port:
                        description: Port is the BGP port. Default 179.
                        format: int32
                        type: integer
                    required:
                    - image
                    type: object
                  birdAdapter:
                    description: |-
                      BirdAdapter is a SEPARATE Deployment (not a sidecar to bird),
